spring.application.name=SaborPeruAPI
server.port=8080

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/saborperu?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate JPA Configuration
# NOTE: Using 'none' because Flyway handles schema migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validateOnMigrate=false
spring.flyway.outOfOrder=false
spring.flyway.ignore-migration-patterns=*:future

# Logging
logging.level.root=INFO
logging.level.com.saborperu.api=DEBUG
logging.level.com.saborperu.api.security=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# JWT Configuration
# NOTE: JWT_SECRET must be set as environment variable in PRODUCTION
# For development, use a deterministic local fallback to keep tokens stable between restarts.
# Set via: export JWT_SECRET="your-secure-256-bit-key-here" (Unix/Linux/Mac)
#          setx JWT_SECRET "your-secure-256-bit-key-here" (Windows)
app.jwt.secret=${JWT_SECRET:saborperu-dev-jwt-secret-key-2026-change-in-production-min-32-bytes}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Enabling Swagger/Springdoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Integracion API externa
app.external.themealdb.base-url=${THEMEALDB_BASE_URL:https://www.themealdb.com/api/json/v1/1}
